name: base_PhdOncology_env
channels:
  - radiomics       # Priority 1: It gets pyradiomics from here
  - pytorch
  - nvidia
  - conda-forge     
  - nodefaults
dependencies:
  # --- CORE ---
  - python=3.9      # <--- Compatibility with pyradiomics
  - pip
  - mamba

  # --- GPU & PYTORCH ---
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # --- MEDICAL IMAGING (Conda) ---
  - pyradiomics     # Installed via Conda (Channel 'radiomics')
  - simpleitk
  - nibabel
  - dicom2nifti

  # --- DATA SCIENCE ---
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  
  # --- PIP ONLY ---
  - pip:
    - monai[all]
    - wandb
    - tqdm
    - einops
    - torchio